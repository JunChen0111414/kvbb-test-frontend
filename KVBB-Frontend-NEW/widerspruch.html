<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Widerspruch – KVBB</title>
    <style>
        body { background-color: #d9e4f0; font-family: Arial, Helvetica, sans-serif; color: #1a1a1a; min-height: 100vh; }
        .page-wrapper { max-width: 820px; margin: 28px auto; padding: 0 16px; }
        .form-card { background: white; border: 1px solid #8fa8c3; border-top: 4px solid #003087; margin-top: 40px; }
        .form-card-header { background-color: #e8eef5; border-bottom: 1px solid #8fa8c3; padding: 10px 20px; }
        .form-card-header h2 { font-size: 15px; color: #003087; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-body { padding: 28px 24px 20px; }
        .response-box { background: #eef2f7; border: 1px solid #8fa8c3; padding: 18px; font-size: 15px; color: #003087; white-space: pre-wrap; }
        .nav-bar { margin-top: 24px; }
        .btn { padding: 7px 22px; font-size: 13px; font-family: Arial, Helvetica, sans-serif; cursor: pointer; border: 1px solid transparent; font-weight: bold; text-transform: uppercase; letter-spacing: 0.4px; background-color: #003087; color: white; border-color: #00256e; text-decoration: none; }
        .btn:hover { background-color: #00256e; }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <div class="form-card">
            <div class="form-card-header">
                <h2>Widerspruch – Rückmeldung</h2>
            </div>
            <div class="form-body">
                <div id="response" class="response-box">Lade Antwort …</div>
                <div class="nav-bar">
                    <a href="status.html" class="btn">Zurück zum Status</a>
                </div>
            </div>
        </div>
    </div>
    <script>
        // Zeige die gespeicherte Response an
        var resp = localStorage.getItem('widerspruch_response');
        document.getElementById('response').textContent = resp || 'Keine Antwort erhalten.';
        // Optional: Nach Anzeige löschen
        localStorage.removeItem('widerspruch_response');
    </script>
</body>
</html>
